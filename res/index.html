<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Eastern Eye</title>
    <style>
        body { font-family: monospace; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #1a1a1a; color: #ccc; }
        h1 { color: #fff; }
        h2 { color: #aaa; border-bottom: 1px solid #333; padding-bottom: 4px; margin-top: 32px; }
        .row { display: flex; align-items: center; margin: 8px 0; }
        .row label { width: 260px; color: #888; flex-shrink: 0; }
        .row input { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 4px 8px; width: 160px; }
        .row input:focus { outline: 1px solid #666; }
        #status { display: inline-block; padding: 4px 12px; border-radius: 3px; }
        .ok  { background: #1a3a1a; color: #4c4; border: 1px solid #2a5a2a; }
        .err { background: #3a1a1a; color: #c44; border: 1px solid #5a2a2a; }
        button { margin-top: 24px; padding: 8px 24px; background: #2a2a2a; color: #ccc; border: 1px solid #555; cursor: pointer; font-family: monospace; }
        button:hover { background: #3a3a3a; }
        #msg { margin-top: 12px; color: #888; min-height: 1.2em; }
        #stats { margin-top: 16px; padding: 12px; background: #202020; border: 1px solid #333; }
        #stats .stat { display: flex; justify-content: space-between; margin: 4px 0; }
        #stats .stat .k { color: #888; }
        #stats .stat .v { color: #fff; }
        #stats .warn { color: #c44; font-weight: bold; margin-top: 8px; }
        #stats .cats { margin-top: 8px; padding-top: 8px; border-top: 1px solid #333; }
    </style>
</head>
<body>

<h1>Eastern Eye</h1>
<div>Статус: <span id="status">...</span></div>
<div id="stats">загрузка...</div>
<div class="row" style="margin-top: 16px;">
    <label>Опрос статистики, мс</label>
    <input type="number" id="pollInterval" min="100" step="100">
</div>
<div id="form"></div>
<button onclick="saveConfig()">Сохранить</button>
<div id="msg"></div>

<script>
const BIG = 1e30;

const schema = {
    inspectionSystemConfig: {
        label: 'Система инспекции',
        fields: [
            { key: 'detectInterval_',       label: 'detectInterval',       step: 1, min: 1 },
            { key: 'lineStopThresholdSec_', label: 'lineStopThresholdSec', step: 1, min: 0 },
        ]
    },
    boardDetectorConfig: {
        label: 'Детектор досок',
        fields: [
            { key: 'minRelativeArea_',  label: 'minRelativeArea',  step: 0.001, min: 0, max: 1 },
            { key: 'maxRelativeArea_',  label: 'maxRelativeArea',  step: 0.001, min: 0 },
            { key: 'minAspectRatio_',   label: 'minAspectRatio',   step: 0.01,  min: 0 },
            { key: 'maxAspectRatio_',   label: 'maxAspectRatio',   step: 0.01,  min: 0 },
            { key: 'minX_',             label: 'minX',             step: 1,     min: 0 },
            { key: 'maxX_',             label: 'maxX',             step: 1,     min: 0 },
            { key: 'minY_',             label: 'minY',             step: 1,     min: 0 },
            { key: 'maxY_',             label: 'maxY',             step: 1,     min: 0 },
            { key: 'labAThreshold_',    label: 'labAThreshold',    step: 1,     min: 0, max: 255 },
        ]
    },
    boardTrackerConfig: {
        label: 'Трекер досок',
        fields: [
            { key: 'minIouMatch_',     label: 'minIouMatch',     step: 0.01, min: 0, max: 1 },
            { key: 'maxFramesLost_',   label: 'maxFramesLost',   step: 1,    min: 0 },
            { key: 'countLineX_',      label: 'countLineX',      step: 1,    min: 0 },
            { key: 'countLineY_',      label: 'countLineY',      step: 1,    min: 0 },
            { key: 'minFramesStable_', label: 'minFramesStable', step: 1,    min: 0 },
        ]
    },
    boardAnalyzerConfig: {
        label: 'Анализатор досок',
        fields: [
            { key: 'gradeA_minLightness_',   label: 'gradeA minLightness',   step: 0.1,  min: 0, max: 100 },
            { key: 'gradeA_maxDefectRatio_', label: 'gradeA maxDefectRatio', step: 0.001,min: 0, max: 1 },
            { key: 'gradeB_minLightness_',   label: 'gradeB minLightness',   step: 0.1,  min: 0, max: 100 },
            { key: 'gradeB_maxDefectRatio_', label: 'gradeB maxDefectRatio', step: 0.001,min: 0, max: 1 },
        ]
    }
};

// --- построение формы ---

function buildForm() {
    const root = document.getElementById('form');
    for (const [section, { label, fields }] of Object.entries(schema)) {
        const h = document.createElement('h2');
        h.textContent = label;
        root.appendChild(h);
        for (const f of fields) {
            const row = document.createElement('div');
            row.className = 'row';
            const lbl = document.createElement('label');
            lbl.textContent = f.label;
            const inp = document.createElement('input');
            inp.type = 'number';
            inp.id = section + '.' + f.key;
            inp.step = f.step;
            if (f.min !== undefined) inp.min = f.min;
            if (f.max !== undefined) inp.max = f.max;
            row.appendChild(lbl);
            row.appendChild(inp);
            root.appendChild(row);
        }
    }
}

// --- заполнение / чтение ---

function fillForm(cfg) {
    for (const [section, { fields }] of Object.entries(schema)) {
        for (const f of fields) {
            const v = cfg[section][f.key];
            document.getElementById(section + '.' + f.key).value =
                (v === null || !isFinite(v) || v > BIG) ? '' : v;
        }
    }
}

function readForm() {
    const cfg = {};
    for (const [section, { fields }] of Object.entries(schema)) {
        cfg[section] = {};
        for (const f of fields) {
            const raw = document.getElementById(section + '.' + f.key).value;
            cfg[section][f.key] = raw === '' ? BIG : parseFloat(raw);
        }
    }
    return cfg;
}

// --- API ---

async function loadConfig() {
    const r = await fetch('/api/config');
    fillForm(await r.json());
}

async function saveConfig() {
    const r = await fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(readForm())
    });
    document.getElementById('msg').textContent = r.ok ? 'Сохранено.' : 'Ошибка: ' + r.status;
}

function renderStats(s)
{
    const statusEl = document.getElementById('status');
    if (s.lineStopped)
    {
        statusEl.textContent = 'линия остановлена';
        statusEl.className = 'err';
    }
    else
    {
        statusEl.textContent = 'работает';
        statusEl.className = 'ok';
    }

    let html = '';
    html += `<div class="stat"><span class="k">Активных треков</span><span class="v">${s.activeTracks}</span></div>`;
    html += `<div class="stat"><span class="k">Детекций в кадре</span><span class="v">${s.totalDetected}</span></div>`;
    html += `<div class="stat"><span class="k">Посчитано всего</span><span class="v">${s.totalCounted}</span></div>`;
    html += `<div class="stat"><span class="k">Секунд без движения</span><span class="v">${s.secondsSinceMotion}</span></div>`;

    if (s.lineStopped)
        html += `<div class="warn">ВНИМАНИЕ: линия остановлена</div>`;

    const cats = Object.entries(s.categoryCounts || {});
    if (cats.length > 0)
    {
        html += '<div class="cats">';
        for (const [cat, cnt] of cats)
            html += `<div class="stat"><span class="k">${cat}</span><span class="v">${cnt}</span></div>`;
        html += '</div>';
    }
    document.getElementById('stats').innerHTML = html;
}

async function updateStats()
{
    try
    {
        const s = await (await fetch('/api/stats')).json();
        renderStats(s);
    }
    catch
    {
        const el = document.getElementById('status');
        el.textContent = 'недоступен';
        el.className = 'err';
        document.getElementById('stats').textContent = '—';
    }
}

let pollTimer = null;

function applyPollInterval()
{
    const ms = Math.max(100, parseInt(document.getElementById('pollInterval').value, 10) || 1000);
    localStorage.setItem('pollIntervalMs', ms);
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(updateStats, ms);
}

document.getElementById('pollInterval').value = localStorage.getItem('pollIntervalMs') || 1000;
document.getElementById('pollInterval').addEventListener('change', applyPollInterval);

buildForm();
loadConfig();
updateStats();
applyPollInterval();
</script>
</body>
</html>
